; Tokei firmware
; - env:esp32s3 builds the production firmware targeting Waveshare ESP32-S3-RLCD-4.2
; - env:native runs unit tests on the host for pure-logic modules

[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env]
build_flags =
    -std=gnu++17
    -DTOKEI_VERSION_STRING=\"0.0.1\"
build_unflags = -std=gnu++11

[env:esp32s3]
platform = espressif32@^6.8.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

; Board-specific CPU/flash config for Waveshare ESP32-S3-RLCD-4.2
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi

build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -I${PROJECT_DIR}/lib/waveshare_bsp

lib_deps =
    lvgl/lvgl@~9.2.2
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17
    https://github.com/Seeed-Studio/Seeed_SHT35.git

[env:native]
platform = native
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -I${PROJECT_DIR}/include
    -I${PROJECT_DIR}/src
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    throwtheswitch/Unity@^2.6.0
lib_ignore = waveshare_bsp
test_build_src = true
